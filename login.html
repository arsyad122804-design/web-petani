<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Portal Pertanian</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="login.css" />  <meta property="og:type" content="website" />
  <meta property="og:title" content="Portal Pertanian Indonesia" />
  <meta property="og:description" content="Portal pertanian terlengkap untuk petani Indonesia — berita terkini, harga pasar, diagnosa tanaman, dan komunitas petani." />
  <meta property="og:image" content="https://web-petani-indonesia.vercel.app/bg-hero.jpg" />
  <meta property="og:url" content="https://web-petani-indonesia.vercel.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://web-petani-indonesia.vercel.app/bg-hero.jpg" />
</head>
<body>
  <header>
    <a href="home.html" style="display:flex;align-items:center;text-decoration:none;flex-shrink:0"><img src="logo.png" alt="Portal Pertanian" style="height:72px;width:auto;max-width:220px;object-fit:contain;filter:brightness(10) drop-shadow(0 1px 3px rgba(0,0,0,.4));" /></a>
    <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainNav">
      <a href="home.html">?? Beranda</a>
      <a href="berita.html">?? Berita</a>
      <a href="forum.html">?? Forum</a>
      <a href="marketplace.html">?? Marketplace</a>
      <a href="keuangan.html">?? Keuangan</a>
      <a href="akun.html">?? Akun</a>
    </nav>
  </header>

  <div class="login-page">
    <div class="login-hero">
      <div class="lh-deco">??</div>
      <div class="lh-deco2">??</div>
    </div>

    <div class="login-card">
      <div class="login-logo">??</div>
      <h2 class="login-title">Selamat Datang</h2>
      <p class="login-sub">Masuk untuk mulai beli & jual produk pertanian</p>

      <!-- Tab -->
      <div class="login-tabs">
        <button class="ltab aktif" id="tabMasuk" onclick="switchLoginTab('masuk')">Masuk</button>
        <button class="ltab" id="tabDaftar" onclick="switchLoginTab('daftar')">Daftar</button>
      </div>

      <!-- Form Masuk -->
      <div id="formMasuk">
        <div class="lfg"><label>Email</label><input type="email" id="loginEmail" placeholder="email@contoh.com" /></div>
        <div class="lfg"><label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="loginPass" placeholder="Password kamu" />
            <button class="toggle-pass" onclick="togglePass('loginPass', this)">???</button>
          </div>
        </div>
        <div class="login-error" id="loginError"></div>
        <button class="btn-login" onclick="doLogin()">?? Masuk</button>
      </div>

      <!-- Form Daftar -->
      <div id="formDaftar" style="display:none">
        <div class="lfg"><label>Nama Lengkap</label><input type="text" id="regNama" placeholder="Nama lengkap kamu" /></div>
        <div class="lfg"><label>Email</label><input type="email" id="regEmail" placeholder="email@contoh.com" /></div>
        <div class="lfg"><label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="regPass" placeholder="Minimal 6 karakter" />
            <button class="toggle-pass" onclick="togglePass('regPass', this)">???</button>
          </div>
        </div>
        <div class="login-error" id="regError"></div>
        <button class="btn-login" onclick="doRegister()">? Buat Akun</button>
      </div>

      <div class="login-divider"><span>atau masuk dengan</span></div>

      <div class="social-btns">
        <button class="btn-social btn-google" onclick="loginGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Lanjutkan dengan Google
        </button>
      </div>

      <div class="login-divider"><span>atau</span></div>
      <a href="home.html" class="btn-skip">Lanjut tanpa login (hanya lihat)</a>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="login.js"></script>
  <script src="navbar.js"></script>
</body>
</html>
