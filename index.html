<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tani App" />
  <title>Portal Pertanian Indonesia</title>
  <link rel="stylesheet" href="cover.css" />  <meta property="og:type" content="website" />
  <meta property="og:title" content="Portal Pertanian Indonesia" />
  <meta property="og:description" content="Portal pertanian terlengkap untuk petani Indonesia Ś berita terkini, harga pasar, diagnosa tanaman, dan komunitas petani." />
  <meta property="og:image" content="https://web-petani-indonesia.vercel.app/bg-hero.jpg" />
  <meta property="og:url" content="https://web-petani-indonesia.vercel.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://web-petani-indonesia.vercel.app/bg-hero.jpg" />
</head>
<body>

  <div class="cover-page" id="coverPage">

    <!-- Background animasi -->
    <div class="bg-circles">
      <div class="circle c1"></div>
      <div class="circle c2"></div>
      <div class="circle c3"></div>
      <div class="circle c4"></div>
    </div>

    <!-- Partikel daun -->
    <div class="leaves" id="leaves"></div>

    <!-- Konten utama -->
    <div class="cover-content">
      <div class="cover-logo">??</div>
      <div class="cover-tagline">Selamat Datang di</div>
      <h1 class="cover-title"><span id="typeText"></span><span class="cursor" id="cursorMain">|</span></h1>
      <p class="cover-desc"><span id="typeDesc"></span><span class="cursor-desc" id="cursorDesc" style="display:none">|</span></p>

      <div class="cover-features">
        <div class="cf-item"><span>??</span> Diagnosa Tanaman</div>
        <div class="cf-item"><span>??</span> Harga Pasar</div>
        <div class="cf-item"><span>??</span> Panduan Bertani</div>
        <div class="cf-item"><span>??</span> Komunitas</div>
      </div>

      <button class="btn-masuk" onclick="masukHome()">
        Mulai Sekarang <span class="arrow">?</span>
      </button>

      <div class="cover-skip" onclick="masukHome()">Lewati</div>
    </div>

    <!-- Progress bar -->
    <div class="cover-progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>

  </div>

  <script src="cover.js"></script>
</body>
</html>
