<!DOCTYPE html>

<body>
  <header>
    <a href="home.html" style="display:flex;align-items:center;text-decoration:none"><img src="logo.png" alt="Portal Pertanian" style="height:44px;width:auto;object-fit:contain" /></a>
    <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainNav">
      <a href="home.html">?? Beranda</a>
      <a href="berita.html">?? Berita</a>
      <a href="forum.html">?? Forum</a>
      <a href="marketplace.html">?? Marketplace</a>
      <a href="keuangan.html">?? Keuangan</a>
      <a href="akun.html" id="navAkun" style="display:none">?? Akun</a>
    </nav>
  </header>
  <div class="cuaca-page">
    <div class="cuaca-hero">
      <div class="hero-dots"></div>
      <div class="hero-circle-sm"></div>
      <div class="hero-line"></div>
      <h2>??? Cuaca &amp; Waktu Tanam</h2>
      <p>Cari provinsimu, lihat prediksi cuaca, dan dapatkan rekomendasi tanaman terbaik.</p>
      <div class="cuaca-search-bar">
        <span>??</span>
        <input type="text" id="searchInput" placeholder="Cari provinsi..." oninput="filterGrid()" autocomplete="off" />
      </div>
    </div>
    <div class="cuaca-content" id="cuacaContent" style="display:none">
      <div class="prov-header" id="provHeader"></div>
      <div class="cuaca-grid" id="cuacaGrid"></div>
      <div class="rek-wrapper">
        <div class="rek-title-bar">
          <h3>?? Rekomendasi Tanaman</h3>
          <span id="rekMusim"></span>
        </div>
        <div class="rek-grid" id="rekGrid"></div>
      </div>
      <div class="kal-wrapper">
        <h3>?? Kalender Tanam Bulanan</h3>
        <div class="kal-scroll" id="kalScroll"></div>
        <div class="kal-legend">
          <span><i class="dot-tanam"></i> Tanam</span>
          <span><i class="dot-panen"></i> Panen</span>
          <span><i class="dot-kosong"></i> Tidak aktif</span>
        </div>
      </div>
      <div class="tips-wrapper" id="tipsWrapper"></div>
      <button class="btn-ganti" onclick="gantiProvinsi()">?? Ganti Provinsi</button>
    </div>
    <div class="cuaca-placeholder" id="cuacaPlaceholder">
      <div class="prov-section">
        <div class="prov-all-grid" id="provAllGrid"></div>
      </div>
    </div>
  </div>
  <footer><p>© 2026 Portal Pertanian Indonesia</p></footer>
  <script src="cuaca.js"></script>
  <script src="supabase.js"></script>
